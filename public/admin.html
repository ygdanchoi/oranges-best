<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #1a1a1a;
        }

        @media (prefers-color-scheme: light) {
            body {
                background: #f5f5f5;
            }
        }

        .admin-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
            z-index: 10;
        }

        .login-section, .add-section, .list-section {
            background: rgba(255,255,255,0.72);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        @media (prefers-color-scheme: dark) {
            .login-section, .add-section, .list-section {
                background: rgba(42,42,42,0.72);
            }
        }

        .hidden {
            display: none;
        }

        h1 {
            margin: 0 0 1.5rem 0;
            color: #333;
        }

        @media (prefers-color-scheme: dark) {
            h1 {
                color: #fff;
            }
        }

        h2 {
            margin: 0 0 1rem 0;
            color: #555;
            font-size: 1.2rem;
        }

        @media (prefers-color-scheme: dark) {
            h2 {
                color: #ccc;
            }
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.25rem;
            color: #666;
            font-weight: 500;
        }

        @media (prefers-color-scheme: dark) {
            label {
                color: #ccc;
            }
        }

        input, textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }

        @media (prefers-color-scheme: dark) {
            input, textarea {
                background: #1a1a1a;
                border-color: #444;
                color: #fff;
            }
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            background: #ff8c00;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #ff7700;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .orange-item {
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        @media (prefers-color-scheme: dark) {
            .orange-item {
                border-bottom-color: #444;
            }
        }

        .orange-item:last-child {
            border-bottom: none;
        }

        .orange-info {
            flex: 1;
        }

        .orange-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            color: #333;
        }

        @media (prefers-color-scheme: dark) {
            .orange-name {
                color: #fff;
            }
        }

        .orange-description {
            color: #666;
            font-size: 0.9rem;
        }

        @media (prefers-color-scheme: dark) {
            .orange-description {
                color: #ccc;
            }
        }

        .orange-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .btn-delete {
            background: #dc3545;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .message {
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .edit-form {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 0.5rem;
        }

        @media (prefers-color-scheme: dark) {
            .edit-form {
                background: #333;
            }
        }

        .edit-votes-form {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 0.5rem;
        }

        @media (prefers-color-scheme: dark) {
            .edit-votes-form {
                background: #333;
            }
        }

        .edit-votes-form select {
            background: white;
            color: #333;
        }

        @media (prefers-color-scheme: dark) {
            .edit-votes-form select {
                background: #1a1a1a;
                color: #fff;
                border-color: #444;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Login Section -->
        <div id="loginSection" class="login-section">
            <h2>Login</h2>
            <div id="loginMessage"></div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter admin password">
            </div>
            <button onclick="login()">Login</button>
        </div>

        <!-- List Oranges Section -->
        <div id="listSection" class="list-section hidden">
            <h2>Existing Oranges</h2>
            <div id="orangesList"></div>
        </div>

        <!-- Add Orange Section -->
        <div id="addSection" class="add-section hidden">
            <h2>Add New Orange</h2>
            <div id="addMessage"></div>
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="e.g. Navel Orange">
            </div>
            <div class="form-group">
                <label for="store">Store:</label>
                <input type="text" id="store" placeholder="e.g. Whole Foods, HMart, Costco">
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" placeholder="e.g. Sweet and seedless"></textarea>
            </div>
            <div class="form-group">
                <label for="imageUrl">Image URL:</label>
                <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg">
            </div>
            <button onclick="addOrange()">Add Orange</button>
        </div>
    </div>

    <script src="sphere.js"></script>
    <script src="menu.js"></script>
    <script src="admin.js"></script>
</body>
</html>
